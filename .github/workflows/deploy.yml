name: Deploy Backend to VPS

# Se ejecutará automáticamente cada vez que subas código a la rama 'master'
on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Conectarse al Servidor por SSH y Actualizar Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          # Estos son los comandos que GitHub escribirá en tu consola
          script: |
            cd /var/www/backend
            git stash
            git pull origin master
            cd /var/www
            docker compose up -d --build backend